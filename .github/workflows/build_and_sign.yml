name: Build Signed Play Store Artifacts

on:
  workflow_dispatch: # এর মাধ্যমে আপনি যেকোনো সময় ম্যানুয়ালি বিল্ড শুরু করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ENCODED_KEYSTORE: ${{ secrets.ENCODED_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          test -n "$ENCODED_KEYSTORE"
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_PASSWORD"
          test -n "$KEY_ALIAS"
          echo "$ENCODED_KEYSTORE" | base64 --decode > android/upload-keystore.jks
          printf '%s\n' \
            "storePassword=$KEYSTORE_PASSWORD" \
            "keyPassword=$KEY_PASSWORD" \
            "keyAlias=$KEY_ALIAS" \
            "storeFile=upload-keystore.jks" > android/key.properties

      - name: Build Signed APK
        run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Build Signed AAB
        run: flutter build appbundle --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Signed-PlayStore-AAB
          path: build/app/outputs/bundle/release/app-release.aab
