name: Build Signed AAB and APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Install dependencies
      run: flutter pub get

    - name: Prepare Android signing
      env:
        ENCODED_KEYSTORE: ${{ secrets.ENCODED_KEYSTORE }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        test -n "$ENCODED_KEYSTORE"
        test -n "$KEYSTORE_PASSWORD"
        test -n "$KEY_PASSWORD"
        test -n "$KEY_ALIAS"
        echo "$ENCODED_KEYSTORE" | base64 --decode > android/upload-keystore.jks
        printf '%s\n' \
          "storePassword=$KEYSTORE_PASSWORD" \
          "keyPassword=$KEY_PASSWORD" \
          "keyAlias=$KEY_ALIAS" \
          "storeFile=upload-keystore.jks" > android/key.properties

    - name: Build APK
      run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

    - name: Build AAB (For Play Store)
      run: flutter build appbundle --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: signed-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: signed-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
